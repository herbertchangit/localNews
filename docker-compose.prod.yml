name: localnews

services:
  db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: news
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env.production}
      POSTGRES_DB: newsroom
    volumes:
      - news_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U news -d newsroom"]
      interval: 5s
      timeout: 3s
      retries: 20
    networks:
      - backend

  app:
    build: .
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://news:${POSTGRES_PASSWORD}@db:5432/newsroom
      JWT_SECRET: ${JWT_SECRET:?Set JWT_SECRET in .env.production}
      PORT: 4000
      NODE_ENV: production
    expose:
      - "4000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - avatar_data:/app/uploads
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:4000/api/health"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - backend

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      app:
        condition: service_healthy
    networks:
      - backend
      - edge

networks:
  backend:
    internal: true
  edge:

volumes:
  news_data:
  avatar_data:
  caddy_data:
  caddy_config:
